<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Experiment | Growth Calculator</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <style>
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #1E3A8A; font-size: 0.9em; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .dashboard { background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .metric { font-size: 1.5em; font-weight: bold; color: #3B82F6; }
        button { width: 100%; padding: 12px; background: #1E3A8A; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #3B82F6; }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <h1><a href="../index.html">Home</a></h1> |
        <h1><a href="scratch.html">Scratch</a></h1> |
        <h1><a href="resume.html">Resume</a></h1>
    </nav>

    <h2>Growth & ROI Experiment Lab</h2>
    <p>Use this tool to simulate the impact of conversion optimization on your bottom line.</p>

    <div class="input-grid">
        <div class="input-group">
            <label>Monthly Traffic (Visitors)</label>
            <input type="number" id="visitors" value="1000">
        </div>
        <div class="input-group">
            <label>Conversion Rate (%)</label>
            <input type="number" id="conversion" value="2" step="0.1">
        </div>
        <div class="input-group">
            <label>Avg. Order Value ($)</label>
            <input type="number" id="aov" value="65">
        </div>
        <div class="input-group">
            <label>Ad Spend ($)</label>
            <input type="number" id="spend" value="200">
        </div>
    </div>

    <button onclick="calculate()">Run Experiment</button>

    <div class="dashboard" style="margin-top: 20px;">
        <div class="input-grid">
            <div>
                <p>New Customers</p>
                <div id="res-cust" class="metric">0</div>
            </div>
            <div>
                <p>Total Revenue</p>
                <div id="res-rev" class="metric">$0</div>
            </div>
            <div>
                <p>CAC (Acquisition Cost)</p>
                <div id="res-cac" class="metric">$0</div>
            </div>
            <div>
                <p>Net Profit</p>
                <div id="res-profit" class="metric">$0</div>
            </div>
        </div>
    </div>
</div>

<script>
function calculate() {
    const v = parseFloat(document.getElementById('visitors').value);
    const c = parseFloat(document.getElementById('conversion').value) / 100;
    const aov = parseFloat(document.getElementById('aov').value);
    const spend = parseFloat(document.getElementById('spend').value);

    const customers = v * c;
    const revenue = customers * aov;
    const cac = customers > 0 ? (spend / customers) : 0;
    const profit = revenue - spend;

    document.getElementById('res-cust').innerText = customers.toFixed(0);
    document.getElementById('res-rev').innerText = "$" + revenue.toLocaleString();
    document.getElementById('res-cac').innerText = "$" + cac.toFixed(2);
    document.getElementById('res-profit').innerText = "$" + profit.toLocaleString();
    
    // Visual cue for profit/loss
    document.getElementById('res-profit').style.color = profit >= 0 ? "#10b981" : "#ef4444";
}
</script>

</body>
</html>
